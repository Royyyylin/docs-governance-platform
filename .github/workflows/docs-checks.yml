name: docs-checks

on:
  workflow_call:
    inputs:
      markdownlint_version:
        description: 'markdownlint-cli2 version (e.g. 0.17.2)'
        type: string
        default: '0.17.2'
      lint_paths:
        description: 'Space-separated glob paths for markdownlint'
        type: string
        default: 'docs/current/**/*.md docs/adr/**/*.md docs/index.md docs/domain/**/*.md work/**/*.md'
      link_check_folders:
        description: 'Comma-separated folder paths for link check'
        type: string
        default: 'docs/current,docs/adr,docs/domain'
      link_check_config:
        description: 'Path to markdown-link-check config'
        type: string
        default: '.github/mlc-config.json'
      code_impact_patterns:
        description: 'Pipe-separated glob patterns for code-docs sync (e.g. "src/*|include/*|Makefile")'
        type: string
        default: 'src/*|include/*'
      docs_not_needed_label:
        description: 'Label to bypass code-docs sync check'
        type: string
        default: 'docs-not-needed'

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      docs_changed: ${{ steps.filter.outputs.docs_changed }}
      code_changed: ${{ steps.filter.outputs.code_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        env:
          CODE_PATTERNS: ${{ inputs.code_impact_patterns }}
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha || '' }}"
          if [ -z "$BASE_SHA" ]; then
            CHANGED=$(git diff --name-only HEAD~1 2>/dev/null || echo "")
          else
            CHANGED=$(git diff --name-only "$BASE_SHA"...HEAD 2>/dev/null || git diff --name-only HEAD~1 2>/dev/null || echo "")
          fi

          echo "::group::Changed files"
          echo "$CHANGED"
          echo "::endgroup::"

          # Check docs/work paths
          if echo "$CHANGED" | grep -qE '^(docs/|work/)'; then
            echo "docs_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs_changed=false" >> "$GITHUB_OUTPUT"
          fi

          # Check code impact paths (pipe-separated globs)
          CODE_CHANGED=false
          IFS='|' read -ra PATTERNS <<< "$CODE_PATTERNS"
          for pat in "${PATTERNS[@]}"; do
            regex="^$(echo "$pat" | sed 's/\./\\./g; s/\*/.*/g')"
            if echo "$CHANGED" | grep -qE "$regex"; then
              CODE_CHANGED=true
              break
            fi
          done
          echo "code_changed=$CODE_CHANGED" >> "$GITHUB_OUTPUT"

          echo "docs_changed=$(grep docs_changed "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2)"
          echo "code_changed=$CODE_CHANGED"

  frontmatter:
    name: Frontmatter validation
    needs: changes
    if: needs.changes.outputs.docs_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Royyyylin/docs-governance-platform/actions/frontmatter-check@main

  links:
    name: Link check
    needs: changes
    if: needs.changes.outputs.docs_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check folder links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          folder-path: ${{ inputs.link_check_folders }}
          config-file: ${{ inputs.link_check_config }}
          use-quiet-mode: 'yes'
      - name: Check index links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          file-path: 'docs/index.md'
          config-file: ${{ inputs.link_check_config }}
          use-quiet-mode: 'yes'

  lint:
    name: Markdown lint
    needs: changes
    if: needs.changes.outputs.docs_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint markdown
        env:
          LINT_VERSION: ${{ inputs.markdownlint_version }}
          LINT_PATHS: ${{ inputs.lint_paths }}
        run: npx "markdownlint-cli2@${LINT_VERSION}" ${LINT_PATHS}

  impact:
    name: Code-docs sync
    needs: changes
    if: needs.changes.outputs.docs_changed == 'true' || needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: Royyyylin/docs-governance-platform/actions/impact-check@main
        with:
          code_impact_patterns: ${{ inputs.code_impact_patterns }}
          docs_not_needed_label: ${{ inputs.docs_not_needed_label }}
          base_ref: ${{ github.base_ref }}
